name: Trunk Check
author: trunk.io
description: The official trunk.io GitHub action

branding:
  icon: check
  color: green

inputs:
  trunk-path:
    description:
      Path to Trunk Launcher. If not provided, we'll look for it the repo root, `.trunk/bin` and
      `tools/`. If it can't be found anywhere and is not provided explicitly, we'll download it on
      demand.
    required: false

  label:
    description:
      Label to append to the check run name (useful if running Trunk Check on multiple platforms)
    deprecationMessage: "Use `arguments: --github-label=value` instead."
    required: false

  arguments:
    description: Extra arguments to pass to trunk
    required: false

  check-mode:
    description:
      Trunk check mode. Leave unset to autodetect. Set to 'all' to check the entire repository. Set
      to 'populate_cache_only' in a dedicated workflow to populate the GitHub Actions cache with
      Trunk artifacts (see docs for more details).
    required: false

  check-all-mode:
    description:
      If set to "hold-the-line", computes new/existing issues by comparing to previous upload.
    required: false
    default: ""

  check-run-id:
    description: Check run ID. If set, posts annotations using CheckService.
    required: false

  cache:
    description:
      Cache trunk downloads and results between runs. Caching is only needed when using ephemeral CI
      runners.
    required: false
    default: "true"

  cache-key:
    description:
      A key unique to the repo/branch this action is being run on (e.g. the repo name and branch)
    required: false

  post-init:
    description: Steps to run after auto-init / before check
    required: false

  github-token:
    description: For overriding github.token
    required: false

  trunk-token:
    description:
      You can find a per-repo API token in the Trunk web app settings. This will cause results to be
      uploaded to the Trunk web app if this job is a scheduled job running on a branch, or if
      `check-mode` is set to 'all'.
    required: false

  upload-series:
    description:
      Upload series name, for when `trunk-token` is provided. If not provided, we'll use the branch
      name.
    required: false

  save-annotations:
    description:
      Save annotations as an artifact instead of posting them from this action. This is neccesary if
      your repository will be used with forks as they will will not have permissions to upload
      annotations. By default forks will be auto-detected.
    required: false
    default: auto

  post-annotations:
    description:
      Post annotations previously uploaded with the `save-annotations` option (specific to posting
      annotations from forks).
    required: false
    default: "false"

  setup-deps:
    description:
      Install dependencies for trunk check that the trunk CLI does not manage. This is only
      necessary if you have Node dependencies in your package.json that your Node linters need (e.g.
      eslint dependencies, or @types packages).
    required: false
    default: "false"

  debug:
    description: Internal use only
    required: false
    default: "false"

  timeout-seconds:
    description:
      Timeout seconds before we kill the long running trunk check process via unix timeout command.
      Default setting of 0 seconds disables the timeout.
    required: false
    default: 0

  cat-trunk-debug-logs:
    description: Option to cat .trunk/logs/cli.log && .trunk/logs/daemon.log
    required: false
    default: false

  lfs-checkout:
    description: Option to checkout LFS files
    required: false
    default: true

runs:
  using: composite
  steps:
    - name: Set up inputs
      shell: bash
      env:
        _GITHUB_TOKEN: ${{ github.token }}
        _CHECK_MODE: ${{ inputs.check-mode }}
        _GITHUB_TOKEN_INPUT: ${{ inputs.github-token }}
        _TRUNK_TOKEN: ${{ inputs.trunk-token }}
        _PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        _PR_HEAD_REPO_FORK: ${{ github.event.pull_request.head.repo.fork }}
        _PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        _PR_NUMBER: ${{ github.event.pull_request.number }}
        _REF_NAME: ${{ github.ref_name }}
        _ARGUMENTS: ${{ inputs.arguments }}
        _CACHE: ${{ inputs.cache }}
        _CACHE_KEY: ${{ inputs.cache-key }}
        _CAT_TRUNK_DEBUG_LOGS: ${{ inputs.cat-trunk-debug-logs }}
        _CHECK_ALL_MODE: ${{ inputs.check-all-mode }}
        _CHECK_RUN_ID: ${{ inputs.check-run-id }}
        _DEBUG: ${{ inputs.debug }}
        _LABEL: ${{ inputs.label }}
        _SETUP_DEPS: ${{ inputs.setup-deps }}
        _TIMEOUT_SECONDS: ${{ inputs.timeout-seconds }}
        _TRUNK_PATH: ${{ inputs.trunk-path }}
        _UPLOAD_SERIES: ${{ inputs.upload-series }}
        _LFS_CHECKOUT: ${{ inputs.lfs-checkout }}
        _RUNNER_OS: ${{ runner.os }}
        _HASH_TRUNK_YAML: ${{ hashFiles('.trunk/trunk.yaml') }}
      run: |
        safe() { printf '%s' "$1" | tr -d '\n\r'; }

        {
          printf 'GITHUB_TOKEN=%s\n' "$(safe "$_GITHUB_TOKEN")"
          printf 'TRUNK_LAUNCHER_QUIET=false\n'
        } >> "$GITHUB_ENV"

        # First arg is field to fetch, second arg is default value or empty
        payload() {
          if [ $# -lt 2 ]; then
            DEFAULT_VALUE=empty
          else
            DEFAULT_VALUE=\"$2\"
          fi
          if command -v jq >/dev/null; then
            jq -r ".inputs.payload | fromjson | .$1 // ${DEFAULT_VALUE}" ${TEST_GITHUB_EVENT_PATH:-${GITHUB_EVENT_PATH}}
          else
            echo "::error::jq not installed on system!"
            exit 1
          fi
        }

        # Every inputs.field should be referenced as INPUT_FIELD later in the action. This allows
        # the field to be set either as an argument to the github action or via inputs.json.
        if [[ "$_CHECK_MODE" == "payload" ]]; then

          INPUT_GITHUB_TOKEN=$(payload githubToken)
          INPUT_TRUNK_TOKEN=$(payload trunkToken)
          echo "::add-mask::${INPUT_GITHUB_TOKEN}"
          echo "::add-mask::${INPUT_TRUNK_TOKEN}"

          {
            printf 'INPUT_GITHUB_TOKEN=%s\n' "$(safe "${INPUT_GITHUB_TOKEN}")"
            printf 'INPUT_TRUNK_TOKEN=%s\n' "$(safe "${INPUT_TRUNK_TOKEN}")"
            printf 'TRUNK_TOKEN=%s\n' "$(safe "${INPUT_TRUNK_TOKEN}")"
            printf 'TRUNK_API_ADDRESS=%s\n' "$(safe "$(payload trunkApiAddress)")"
            printf 'GITHUB_EVENT_PULL_REQUEST_BASE_REPO_OWNER=%s\n' "$(safe "$(payload pullRequest.base.repo.owner.login)")"
            printf 'GITHUB_EVENT_PULL_REQUEST_BASE_REPO_NAME=%s\n' "$(safe "$(payload pullRequest.base.repo.name)")"
            printf 'GITHUB_EVENT_PULL_REQUEST_BASE_SHA=%s\n' "$(safe "$(payload pullRequest.base.sha)")"
            printf 'GITHUB_EVENT_PULL_REQUEST_HEAD_REPO_FORK=%s\n' "$(safe "$(payload pullRequest.head.repo.fork)")"
            printf 'GITHUB_EVENT_PULL_REQUEST_HEAD_SHA=%s\n' "$(safe "$(payload pullRequest.head.sha)")"
            printf 'GITHUB_EVENT_PULL_REQUEST_NUMBER=%s\n' "$(safe "$(payload pullRequest.number)")"
            printf 'INPUT_ARGUMENTS=%s\n' "$(safe "$(payload arguments)")"
            printf 'INPUT_CACHE=%s\n' "$(safe "$(payload cache)")"
            printf 'INPUT_CACHE_KEY=%s\n' "$(safe "$(payload cacheKey)")"
            printf 'INPUT_CACHE_PATH=%s\n' "$(safe "$(payload cachePath)")"
            printf 'INPUT_CHECK_ALL_MODE=%s\n' "$(safe "$(payload checkAllMode)")"
            printf 'INPUT_CHECK_MODE=%s\n' "$(safe "$(payload checkMode)")"
            printf 'INPUT_CHECK_RUN_ID=%s\n' "$(safe "$(payload checkRunId)")"
            printf 'INPUT_DEBUG=%s\n' "$(safe "$(payload debug)")"
            printf 'INPUT_GITHUB_REF_NAME=%s\n' "$(safe "$(payload targetRefName)")"
            printf 'INPUT_LABEL=%s\n' "$(safe "$(payload label)")"
            printf 'INPUT_SETUP_CACHE_KEY=%s\n' "$(safe "$(payload setupCacheKey)")"
            printf 'INPUT_SETUP_DEPS=%s\n' "$(safe "$(payload setupDeps)")"
            printf 'INPUT_TARGET_CHECKOUT=%s\n' "$(safe "$(payload targetCheckout)")"
            printf 'INPUT_TARGET_CHECKOUT_REF=%s\n' "$(safe "$(payload targetCheckoutRef)")"
            printf 'INPUT_TRUNK_PATH=%s\n' "$(safe "$(payload trunkPath)")"
            printf 'INPUT_UPLOAD_LANDING_STATE=%s\n' "$(safe "$(payload uploadLandingState)")"
            printf 'INPUT_UPLOAD_SERIES=%s\n' "$(safe "$(payload uploadSeries)")"
            printf 'INPUT_UPLOAD_ID=%s\n' "$(safe "$(payload uploadId)")"
            printf 'INPUT_AUTOFIX_AND_PUSH=%s\n' "$(safe "$(payload autofixAndPush)")"
            printf 'INPUT_LFS_CHECKOUT=%s\n' "$(safe "$(payload lfsCheckout true)")"
          } >> "$GITHUB_ENV"

        else

          {
            printf 'INPUT_GITHUB_TOKEN=%s\n' "$(safe "$_GITHUB_TOKEN_INPUT")"
            printf 'INPUT_TRUNK_TOKEN=%s\n' "$(safe "$_TRUNK_TOKEN")"
            printf 'TRUNK_TOKEN=%s\n' "$(safe "$_TRUNK_TOKEN")"
            printf 'GITHUB_EVENT_PULL_REQUEST_BASE_SHA=%s\n' "$(safe "$_PR_BASE_SHA")"
            printf 'GITHUB_EVENT_PULL_REQUEST_HEAD_REPO_FORK=%s\n' "$(safe "$_PR_HEAD_REPO_FORK")"
            printf 'GITHUB_EVENT_PULL_REQUEST_HEAD_SHA=%s\n' "$(safe "$_PR_HEAD_SHA")"
            printf 'GITHUB_EVENT_PULL_REQUEST_NUMBER=%s\n' "$(safe "$_PR_NUMBER")"
            printf 'GITHUB_REF_NAME=%s\n' "$(safe "$_REF_NAME")"
            printf 'INPUT_ARGUMENTS=%s\n' "$(safe "$_ARGUMENTS")"
            printf 'INPUT_CACHE=%s\n' "$(safe "$_CACHE")"
            printf 'INPUT_CACHE_KEY=trunk-%s-%s-%s\n' "$(safe "$_CACHE_KEY")" "$(safe "$_RUNNER_OS")" "$(safe "$_HASH_TRUNK_YAML")"
            printf 'INPUT_CACHE_PATH=%s\n' "$(safe "~/.cache/trunk")"
            printf 'INPUT_CAT_TRUNK_DEBUG_LOGS=%s\n' "$(safe "$_CAT_TRUNK_DEBUG_LOGS")"
            printf 'INPUT_CHECK_ALL_MODE=%s\n' "$(safe "$_CHECK_ALL_MODE")"
            printf 'INPUT_CHECK_MODE=%s\n' "$(safe "$_CHECK_MODE")"
            printf 'INPUT_CHECK_RUN_ID=%s\n' "$(safe "$_CHECK_RUN_ID")"
            printf 'INPUT_DEBUG=%s\n' "$(safe "$_DEBUG")"
            printf 'INPUT_GITHUB_REF_NAME=%s\n' "$(safe "$_REF_NAME")"
            printf 'INPUT_LABEL=%s\n' "$(safe "$_LABEL")"
            printf 'INPUT_SETUP_CACHE_KEY=%s\n' "$(safe "$_CACHE_KEY")"
            printf 'INPUT_SETUP_DEPS=%s\n' "$(safe "$_SETUP_DEPS")"
            printf 'INPUT_TARGET_CHECKOUT=\n'
            printf 'INPUT_TARGET_CHECKOUT_REF=\n'
            printf 'INPUT_TIMEOUT_SECONDS=%s\n' "$(safe "$_TIMEOUT_SECONDS")"
            printf 'INPUT_TRUNK_PATH=%s\n' "$(safe "$_TRUNK_PATH")"
            printf 'INPUT_UPLOAD_LANDING_STATE=false\n'
            printf 'INPUT_UPLOAD_SERIES=%s\n' "$(safe "$_UPLOAD_SERIES")"
            printf 'INPUT_UPLOAD_ID=\n'
            printf 'INPUT_AUTOFIX_AND_PUSH=\n'
            printf 'INPUT_LFS_CHECKOUT=%s\n' "$(safe "$_LFS_CHECKOUT")"
          } >> "$GITHUB_ENV"

        fi

    - name: Checkout
      if: env.INPUT_TARGET_CHECKOUT
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        lfs: ${{ env.INPUT_LFS_CHECKOUT && inputs.lfs-checkout }}
        submodules: recursive
        repository: ${{ env.INPUT_TARGET_CHECKOUT }}
        ref: ${{ env.INPUT_TARGET_CHECKOUT_REF }}
        token: ${{ env.INPUT_GITHUB_TOKEN }}

    - name: Locate trunk
      shell: bash
      run: ${GITHUB_ACTION_PATH}/setup/locate_trunk.sh

    - name: Determine check mode
      shell: bash
      run: |
        # Determine check mode
        ${GITHUB_ACTION_PATH}/determine_check_mode.sh

    - name: Init on-demand
      shell: bash
      run: |
        if [[ ! -e .trunk/trunk.yaml ]]; then
          ${TRUNK_PATH:-trunk} --ci init
          echo "INITIALIZED_TRUNK=true" >>$GITHUB_ENV
        fi

    - name: Detect setup strategy
      shell: bash
      env:
        _ACTION_PATH: ${{ github.action_path }}
      run: |
        if [[ -e .trunk/setup-ci ]]; then
          echo "INPUT_SETUP_DEPS=true" >>$GITHUB_ENV
        else
          mkdir -p .trunk
          ln -s "${_ACTION_PATH}/setup-env" .trunk/setup-ci
          echo .trunk/setup-ci >>.git/info/exclude
        fi

    - name: Set up env
      uses: ./.trunk/setup-ci
      if: env.INPUT_SETUP_DEPS == 'true'
      with:
        cache-key: ${{ env.INPUT_SETUP_CACHE_KEY }}

    - name: Post-init steps
      if: inputs.post-init
      shell: bash
      env:
        _POST_INIT: ${{ inputs.post-init }}
      run: |
        _post_init_script=$(mktemp)
        printf '%s\n' "$_POST_INIT" > "$_post_init_script"
        bash "$_post_init_script"
        rm -f "$_post_init_script"

    - name: Cache Linters/Formatters
      if: env.TRUNK_CHECK_MODE != 'none' && env.INPUT_CACHE == 'true'
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ env.INPUT_CACHE_PATH }}
        key: ${{ env.INPUT_CACHE_KEY }}

    - name: Run trunk check on pull request
      if: env.TRUNK_CHECK_MODE == 'pull_request'
      shell: bash
      env:
        INPUT_SAVE_ANNOTATIONS: ${{ inputs.save-annotations }}
        _TIMEOUT_SECONDS: ${{ inputs.timeout-seconds }}
      run: |
        # Run 'trunk check' on pull request
        if [[ "$_TIMEOUT_SECONDS" != "0" ]]; then
          timeout "$_TIMEOUT_SECONDS" ${GITHUB_ACTION_PATH}/pull_request.sh
        else
          ${GITHUB_ACTION_PATH}/pull_request.sh
        fi

    - name: Run trunk check on push
      if: env.TRUNK_CHECK_MODE == 'push'
      shell: bash
      env:
        GITHUB_EVENT_AFTER: ${{ env.GITHUB_EVENT_AFTER || github.event.after }}
        GITHUB_EVENT_BEFORE: ${{ env.GITHUB_EVENT_BEFORE || github.event.before }}
        _TIMEOUT_SECONDS: ${{ inputs.timeout-seconds }}
      run: |
        # Run 'trunk check' on push
        if [[ "$_TIMEOUT_SECONDS" != "0" ]]; then
          timeout "$_TIMEOUT_SECONDS" ${GITHUB_ACTION_PATH}/push.sh
        else
          ${GITHUB_ACTION_PATH}/push.sh
        fi

    - name: Run trunk check on all
      if: env.TRUNK_CHECK_MODE == 'all'
      shell: bash
      env:
        _TIMEOUT_SECONDS: ${{ inputs.timeout-seconds }}
      run: |
        # Run 'trunk check' on all
        if [[ "$_TIMEOUT_SECONDS" != "0" ]]; then
          timeout "$_TIMEOUT_SECONDS" ${GITHUB_ACTION_PATH}/all.sh
        else
          ${GITHUB_ACTION_PATH}/all.sh
        fi

    - name: Run trunk check on Trunk Merge
      if: env.TRUNK_CHECK_MODE == 'trunk_merge'
      shell: bash
      env:
        _TIMEOUT_SECONDS: ${{ inputs.timeout-seconds }}
      run: |
        # Run 'trunk check' on Trunk Merge
        if [[ "$_TIMEOUT_SECONDS" != "0" ]]; then
          timeout "$_TIMEOUT_SECONDS" ${GITHUB_ACTION_PATH}/trunk_merge.sh
        else
          ${GITHUB_ACTION_PATH}/trunk_merge.sh
        fi

    - name: Cat Trunk Cli / Daemon logs
      if: always() && inputs.cat-trunk-debug-logs == 'true'
      shell: bash
      run: |
        echo "::group::.trunk/logs/cli.log"
        if [[ -f .trunk/logs/cli.log ]]; then
          cat .trunk/logs/cli.log
        else
          echo ".trunk/logs/cli.log doesn't exist"
        fi
        echo "::endgroup::"

        echo "::group::.trunk/logs/daemon.log"
        if [[ -f .trunk/logs/daemon.log ]]; then
          cat .trunk/logs/daemon.log
        else
          echo ".trunk/logs/daemon.log doesn't exist"
        fi
        echo "::endgroup::"

    - name: Run trunk install to populate the GitHub Actions cache
      if: env.TRUNK_CHECK_MODE == 'populate_cache_only'
      shell: bash
      run: |
        # Run 'trunk install' to populate the GitHub Actions cache
        ${GITHUB_ACTION_PATH}/populate_cache_only.sh

    - name: Upload annotations artifact
      if: always() && env.TRUNK_UPLOAD_ANNOTATIONS == 'true'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: trunk-annotations
        overwrite: true
        path: ${{ env.TRUNK_TMPDIR }}/annotations.bin

    - name: Download annotations artifact
      if: inputs.post-annotations == 'true'
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      env:
        _WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
        _TRUNK_TMPDIR: ${{ env.TRUNK_TMPDIR }}
      with:
        # TODO(chris): We can't use the official download artifact action yet: https://github.com/actions/download-artifact/issues/172
        script: |
          const runId = parseInt(process.env._WORKFLOW_RUN_ID, 10);
          const trunkTmpdir = process.env._TRUNK_TMPDIR;
          let artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
          });
          let matchArtifact = artifacts.data.artifacts.filter((artifact) => {
            return artifact.name == "trunk-annotations"
          })[0];
          if (matchArtifact) {
            let download = await github.rest.actions.downloadArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: matchArtifact.id,
                archive_format: 'zip',
            });
            let fs = require('fs');
            fs.writeFileSync(trunkTmpdir + '/annotations.zip', Buffer.from(download.data));
          }

    - name: Unpack annotations artifact
      if: inputs.post-annotations == 'true'
      shell: bash
      run: |
        # Unpack annotations artifact
        cd "${TRUNK_TMPDIR}" && unzip annotations.zip

    - name: Post annotations
      if: inputs.post-annotations == 'true'
      shell: bash
      run: |
        # Post annotations
        ${GITHUB_ACTION_PATH}/annotate.sh
      env:
        GITHUB_EVENT_WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}

    - name: Upload landing state
      if: env.INPUT_UPLOAD_LANDING_STATE == 'true'
      continue-on-error: true
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: landing-state.json
        path: .trunk/landing-state.json
        overwrite: true
        if-no-files-found: warn

    - name: Cleanup temporary files
      if: always()
      shell: bash
      run: |
        # Cleanup temporary files
        ${GITHUB_ACTION_PATH}/cleanup.sh
