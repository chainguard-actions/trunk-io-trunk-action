name: Update release version
run-name: Move ${{ github.event.inputs.major_version }} to ${{ github.event.inputs.target }}

on:
  workflow_dispatch:
    inputs:
      target:
        description: The tag to use
        required: true
      major_version:
        type: choice
        description: Target major version
        options:
          - v1

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Git config
        run: |
          git config user.name trunkio
          git config user.email github-actions@trunk.io
      - name: Tag new target
        env:
          MAJOR_VERSION: ${{ github.event.inputs.major_version }}
          TARGET: ${{ github.event.inputs.target }}
        run: git tag -f "$MAJOR_VERSION" "$TARGET"
      - name: Push new tag
        env:
          MAJOR_VERSION: ${{ github.event.inputs.major_version }}
        run: git push origin "$MAJOR_VERSION" --force
