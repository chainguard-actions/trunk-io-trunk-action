name: Weekly
on:
  schedule:
    # Weekly at midnight Monday morning
    - cron: 0 8 * * 1
  workflow_dispatch: {}

permissions: {}

jobs:
  trunk_upgrade:
    name: Upgrade Trunk
    runs-on: ubuntu-latest
    permissions:
      contents: write # For trunk to create PRs
      pull-requests: write # For trunk to create PRs
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Create App Token for TrunkBuild App (Internal)
        uses: tibdex/github-app-token@32691ba7c9e7063bd457bd8f2a5703138591fa58 # v1
        id: generate-token
        with:
          app_id: ${{ secrets.TRUNK_OPEN_PR_APP_ID }}
          private_key: ${{ secrets.TRUNK_OPEN_PR_APP_PRIVATE_KEY }}

      - name: Trunk Upgrade
        id: upgrade
        uses: ./upgrade # external users: use trunk-io/trunk-action/upgrade@v1
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          reviewers: TylerJang27
