name: Test trunk action post-init and trunk-path inputs
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create minimal trunk config
        run: |
          mkdir -p .trunk
          cat > .trunk/trunk.yaml << 'EOF'
          version: 0.1
          cli:
            version: 1.22.2
          EOF

      - name: Create a fake trunk binary for testing
        run: |
          mkdir -p /tmp/fake-trunk-bin
          cat > /tmp/fake-trunk-bin/trunk << 'EOF'
          #!/bin/bash
          echo "fake trunk called with: $@"
          exit 0
          EOF
          chmod +x /tmp/fake-trunk-bin/trunk

      - id: action
        uses: .
        continue-on-error: true
        with:
          trunk-path: "/tmp/fake-trunk-bin/trunk"
          post-init: "echo 'post-init step executed successfully'"
          cache: "false"
          debug: "false"
          timeout-seconds: 30
          lfs-checkout: "false"

      - name: Verify action step was invoked with trunk-path and post-init
        run: |
          echo "Action step completed with trunk-path and post-init inputs"
          echo "PASS: trunk-path and post-init inputs were accepted"
