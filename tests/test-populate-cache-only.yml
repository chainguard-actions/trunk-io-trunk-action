name: Test check-mode populate_cache_only
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create minimal trunk config to avoid auto-init
        run: |
          mkdir -p .trunk
          cat > .trunk/trunk.yaml <<'EOF'
          version: 0.1
          cli:
            version: 1.22.2
          EOF

      - name: Place a fake trunk binary that handles install
        run: |
          mkdir -p .trunk/bin
          cat > .trunk/bin/trunk <<'EOF'
          #!/bin/sh
          # Fake trunk binary for testing
          case "$1" in
            version)
              echo "1.22.2"
              exit 0
              ;;
            install)
              echo "fake trunk install: done"
              exit 0
              ;;
            *)
              echo "fake trunk: $*"
              exit 0
              ;;
          esac
          EOF
          chmod +x .trunk/bin/trunk

      - id: action
        uses: .
        with:
          check-mode: populate_cache_only
          cache: "false"

      - name: Assert TRUNK_CHECK_MODE was set to populate_cache_only
        run: |
          echo "TRUNK_CHECK_MODE=$TRUNK_CHECK_MODE"
          if [ "$TRUNK_CHECK_MODE" != "populate_cache_only" ]; then
            echo "FAIL: expected TRUNK_CHECK_MODE=populate_cache_only but got: $TRUNK_CHECK_MODE"
            exit 1
          fi
          echo "PASS: TRUNK_CHECK_MODE=populate_cache_only"
        env:
          TRUNK_CHECK_MODE: ${{ env.TRUNK_CHECK_MODE }}
