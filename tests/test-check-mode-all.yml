name: Test check-mode all with token inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up mock trunk binary
        run: |
          mkdir -p "$HOME/.local/bin"
          cat > "$HOME/.local/bin/trunk" << 'EOF'
          #!/usr/bin/env bash
          echo "mock trunk called with: $*"
          exit 0
          EOF
          chmod +x "$HOME/.local/bin/trunk"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Create minimal trunk config
        run: |
          mkdir -p .trunk
          cat > .trunk/trunk.yaml << 'EOF'
          version: 0.1
          cli:
            version: 1.22.1
          EOF

      - id: action
        uses: .
        with:
          check-mode: all
          arguments: --no-progress
          cache-key: test-repo-main
          github-token: ${{ github.token }}
          trunk-token: fake-trunk-token-for-testing
        continue-on-error: true

      - name: Assert action ran (env vars were set)
        run: |
          echo "Action completed (with or without trunk binary)"
          echo "PASS"
