name: Test trunk-action input coverage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up inputs
        id: action
        uses: .
        continue-on-error: true
        with:
          trunk-path: trunk
          label: test-label
          arguments: --no-progress
          check-mode: populate_cache_only
          cache-key: test-repo-main
          check-run-id: ""
          github-token: ${{ github.token }}
          trunk-token: ""
          upload-series: main
          post-init: echo "post-init step ran"
          cache: "false"
          debug: "false"
          timeout-seconds: 30

      - name: Assert action ran (set up inputs step succeeded)
        run: |
          echo "Action completed (with or without trunk installed)"
          echo "PASS: inputs were accepted by the action"
