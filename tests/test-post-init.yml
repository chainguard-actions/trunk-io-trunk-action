name: Test post-init steps are executed
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create minimal trunk config to avoid auto-init
        run: |
          mkdir -p .trunk
          cat > .trunk/trunk.yaml <<'EOF'
          version: 0.1
          cli:
            version: 1.22.2
          EOF

      - name: Place a fake trunk binary
        run: |
          mkdir -p .trunk/bin
          cat > .trunk/bin/trunk <<'EOF'
          #!/bin/sh
          if [ "$1" = "version" ]; then
            echo "1.22.2"
            exit 0
          fi
          echo "fake trunk: $*"
          exit 0
          EOF
          chmod +x .trunk/bin/trunk

      - id: action
        uses: .
        with:
          check-mode: none
          cache: "false"
          post-init: echo "POST_INIT_EXECUTED=true" >> $GITHUB_ENV

      - name: Assert post-init step was executed
        run: |
          echo "POST_INIT_EXECUTED=$POST_INIT_EXECUTED"
          if [ "$POST_INIT_EXECUTED" != "true" ]; then
            echo "FAIL: expected POST_INIT_EXECUTED=true but got: $POST_INIT_EXECUTED"
            exit 1
          fi
          echo "PASS: post-init step was executed"
        env:
          POST_INIT_EXECUTED: ${{ env.POST_INIT_EXECUTED }}
