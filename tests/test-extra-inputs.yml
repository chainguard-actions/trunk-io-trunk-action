name: Test extra inputs coverage
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          check-mode: populate_cache_only
          cache: "false"
          trunk-path: ""
          label: linux
          post-init: "echo 'post-init step ran'"
          check-run-id: ""
        continue-on-error: true
      - name: Assert action ran without unexpected errors
        run: |
          echo "Action completed with extra inputs (trunk-path, label, post-init, check-run-id)"
          echo "PASS"
