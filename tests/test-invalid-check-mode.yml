name: Test invalid check-mode fails with error
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create minimal trunk config to avoid auto-init
        run: |
          mkdir -p .trunk
          cat > .trunk/trunk.yaml <<'EOF'
          version: 0.1
          cli:
            version: 1.22.2
          EOF

      - name: Place a fake trunk binary
        run: |
          mkdir -p .trunk/bin
          cat > .trunk/bin/trunk <<'EOF'
          #!/bin/sh
          if [ "$1" = "version" ]; then
            echo "1.22.2"
            exit 0
          fi
          echo "fake trunk: $*"
          exit 0
          EOF
          chmod +x .trunk/bin/trunk

      - name: Run action with invalid check-mode (expect failure)
        id: action
        uses: .
        with:
          check-mode: invalid_mode
          cache: "false"
        continue-on-error: true

      - name: Assert action failed for invalid check-mode
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid check-mode but outcome was: ${{ steps.action.outcome }}"
            exit 1
          fi
          echo "PASS: action correctly failed for invalid check-mode"
