name: Test locate trunk script finds trunk binary
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: workflow_dispatch
      GITHUB_REF_NAME: main
      # Pre-set all INPUT_ vars as fallback in case $GITHUB_ENV processing has issues
      INPUT_TRUNK_PATH: /usr/bin/true
      INPUT_CHECK_MODE: none
      INPUT_DEBUG: "false"
      INPUT_CACHE: "false"
      INPUT_SETUP_DEPS: "false"
      INPUT_CACHE_PATH: /tmp/trunk-cache
      INPUT_CACHE_KEY: trunk-test-key
      INPUT_CAT_TRUNK_DEBUG_LOGS: "false"
      INPUT_TIMEOUT_SECONDS: "0"
      INPUT_LFS_CHECKOUT: "false"
      INPUT_UPLOAD_LANDING_STATE: "false"
      INPUT_UPLOAD_SERIES: ""
      INPUT_UPLOAD_ID: ""
      INPUT_AUTOFIX_AND_PUSH: ""
      INPUT_TARGET_CHECKOUT: ""
      INPUT_TARGET_CHECKOUT_REF: ""
      INPUT_GITHUB_REF_NAME: main
      INPUT_LABEL: ""
      INPUT_ARGUMENTS: ""
      INPUT_SETUP_CACHE_KEY: ""
      INPUT_CHECK_ALL_MODE: ""
      INPUT_CHECK_RUN_ID: ""
      INPUT_GITHUB_TOKEN: ""
      INPUT_TRUNK_TOKEN: ""
      TRUNK_TOKEN: ""
      GITHUB_EVENT_PULL_REQUEST_BASE_SHA: ""
      GITHUB_EVENT_PULL_REQUEST_HEAD_REPO_FORK: ""
      GITHUB_EVENT_PULL_REQUEST_HEAD_SHA: ""
      GITHUB_EVENT_PULL_REQUEST_NUMBER: ""
      TRUNK_LAUNCHER_QUIET: "false"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify locate_trunk.sh script exists
        run: |
          if [ -f "./setup/locate_trunk.sh" ]; then
            echo "PASS: locate_trunk.sh found at ./setup/locate_trunk.sh"
          else
            echo "FAIL: locate_trunk.sh not found"
            exit 1
          fi

      - name: Clean up any leftover .trunk/setup-ci from previous runs
        run: rm -f .trunk/setup-ci

      - id: action
        uses: .
        with:
          check-mode: none
          cache: "false"
          setup-deps: "false"
          trunk-path: /usr/bin/true

      - name: Assert action completed and trunk was located
        run: |
          echo "Action completed successfully - trunk was located at /usr/bin/true"
          echo "PASS"
