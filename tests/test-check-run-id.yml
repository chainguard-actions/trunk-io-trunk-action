name: Test trunk-action check-run-id input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run action with check-run-id
        id: action
        uses: .
        continue-on-error: true
        with:
          check-run-id: "12345"
          check-mode: populate_cache_only
          github-token: ${{ github.token }}
          trunk-token: ""
          arguments: --no-progress
          cache-key: test-repo-main
          label: ci-check
          trunk-path: trunk
          upload-series: main
          post-init: echo "post-init ran"
          cache: "false"
          timeout-seconds: 30

      - name: Assert action accepted check-run-id input
        run: |
          echo "Action completed with check-run-id input"
          echo "PASS"
